# (GitHub Actions CI/CD)This GitHub Actions workflow builds and pushes a Docker image to Docker Hub whenever there is a push to the main branch.
name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: nareshbabu2026ai/news-rag-chatbot-streamlit:latest
